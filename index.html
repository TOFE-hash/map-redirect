<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Map</title>
  <style>
    :root {
      --border: #d9d9d9;
      --text: #1f1f1f;
      --muted: #666;
      --bg: #ffffff;
      --button-bg: #f7f7f7;
      --button-hover: #eeeeee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 22px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .button {
      display: block;
      width: 100%;
      text-decoration: none;
      color: var(--text);
      background: var(--button-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px 16px;
      margin: 12px 0;
      font-size: 17px;
      font-weight: 700;
      transition: background 0.15s ease, transform 0.05s ease;
      cursor: pointer;
    }

    .button:hover { background: var(--button-hover); }
    .button:active { transform: translateY(1px); }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Open this location</h1>
    <p>Choose which map app you want to use.</p>

    <a class="button" id="appleBtn" href="#">
      Open in Apple Maps
    </a>

    <a class="button" id="googleBtn" href="#">
      Open in Google Maps
    </a>

    <a class="button" id="browserBtn"
       href="https://www.google.com/maps?q=42.863714,-79.065498">
      Open in Browser Map
    </a>

    <div class="small">
      If one option does not open, come back and try another.
    </div>
  </div>

  <script>
    const lat = "42.863714";
    const lng = "-79.065498";
    const label = "Location";

    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /android/i.test(ua);

    // Apple Maps
    document.getElementById("appleBtn").href =
      `http://maps.apple.com/?ll=${lat},${lng}&q=${encodeURIComponent(label)}`;

    // Google Maps app
    const googleBtn = document.getElementById("googleBtn");

    if (isIOS) {
      // Opens Google Maps app on iPhone if installed
      googleBtn.href =
        `comgooglemaps://?center=${lat},${lng}&q=${encodeURIComponent(label)}`;
    } else if (isAndroid) {
      // Opens Google Maps app on Android
      googleBtn.href =
        `intent://maps.google.com/?q=${lat},${lng}#Intent;scheme=https;package=com.google.android.apps.maps;end`;
    } else {
      // Desktop / fallback
      googleBtn.href =
        `https://www.google.com/maps?q=${lat},${lng}`;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Map</title>
  <style>
    :root {
      --border: #d9d9d9;
      --text: #1f1f1f;
      --muted: #666;
      --bg: #ffffff;
      --button-bg: #f7f7f7;
      --button-hover: #eeeeee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 22px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
    }

    .button {
      display: block;
      width: 100%;
      text-decoration: none;
      color: var(--text);
      background: var(--button-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px 16px;
      margin: 12px 0;
      font-size: 17px;
      font-weight: 700;
      transition: background 0.15s ease;
    }

    .button:hover {
      background: var(--button-hover);
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Short Term Rental Parking Pass</h1>
    <p>Choose which map app you want to use.</p>

    <!-- Apple Maps -->
    <a class="button"
       href="http://maps.apple.com/?ll=42.863714,-79.065498&q=Location">
      Open in Apple Maps
    </a>

    <!-- Google Maps (browser → app if installed) -->
    <a class="button"
       href="https://www.google.com/maps?q=42.863714,-79.065498">
      Open in Google Maps
    </a>

    <div class="small">
      If one option does not open, try the other.
    </div>
  </div>
</body>
</html>
